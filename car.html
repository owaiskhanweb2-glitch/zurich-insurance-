<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Insurance</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- css link of boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Custom CSS File -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        /* HEADER */
        header {
            background: #ffc107;
            color: white;
            padding: 20px;
            text-align: center;
        }


        header h1 {
            font-size: 40px;
            font-weight: 700;
            position: relative;
            text-decoration: underline #ffc107
        }

        /* HERO SECTION */
        .hero {
            height: 400px;
            background: url('car.jpg') no-repeat center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 10px;
        }

        /* CONTAINER */
        .container {
            padding: 20px;
        }

        /* CARDS */
        .card {
            background: white;
            width: 100%;
            height: auto;
            text-align: center;
            padding: 20px 80px;
            margin: 30px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: 0.4s;
            opacity: 0;
            transform: translateX(100px);
            animation: slideIn 1s forwards;
        }

        .card:nth-child(2) {
            animation-delay: 0.3s;
        }

        .card:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .card:hover {
            transform: scale(1.03);
        }

        /* BUTTON */
        .btn {
            background: #ffc107;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: -35px;
        }

        .btn:hover {
            background: #FFDE21;
        }

        /* FORM */
        .form-section {
            background: white;
            width: 100%;
            padding: 20px;
            margin: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .form-section input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>

</head>

<body>
    <div id="nav"></div>
    <!-- HERO -->
    <div class="hero">
        <h1>Secure Your Car Today 🚀</h1>
    </div>

    <div class="container">

        <!-- PLANS -->
        <div class="card">
            <h2>Basic Plan</h2>
            <p>Basic theft and damage protection.</p>
            <button class="btn btn-warning">Buy Now</button>
        </div>

        <div class="card">
            <h2>Standard Plan</h2>
            <p>Accident + theft + third party coverage.</p>
            <button class="btn btn-warning">Buy Now</button>
        </div>

        <div class="card">
            <h2>Premium Plan</h2>
            <p>Full protection + roadside assistance.</p>
            <button class="btn btn-warning">Buy Now</button>
        </div>

        <!-- FORM -->
        <div class="form-section">
            <h2>Apply for Insurance</h2>
            <form onsubmit="submitForm(event)">
                <input type="text" placeholder="Your Name" required>
                <input type="text" placeholder="Car Model" required>
                <input type="number" placeholder="Car  Value" required>
                <input type="email" placeholder="Email Address" required>
                <button class="btn btn-warning">Submit</button>
            </form>
        </div>
    </div>
    <div id="footer"></div>

    <script>
        function submitForm(e) {
            e.preventDefault();
            alert("Insurance Request Submitted Successfully ✅");
        }
    </script>

</body>

</html>
