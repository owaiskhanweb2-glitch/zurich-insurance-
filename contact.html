<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- css link of boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        
    <style>
        * {
            margin: 0%;
            padding: 0%;

        }

        .contact {
            height: 400px;
            width: 95%;
            margin: 120px auto 30px auto;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .contact h2 {
            font-size: 40px;
            font-weight: 700;
            position: relative;
            text-decoration: underline #ffc107
        }
        .send-btn{
            background-color: #ffc107;
            color: black;
            border-radius: 5px;
            font-weight: 450;

            border: 1px solid #ffc107;
            padding: 8px;
        }
    </style>

    <!-- Custom CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navber -->
    <div id="nav"></div>
    <!-- Section -->
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="contact">
                    <h2 class=" text-center mb-4">Contact Us</h2>

                    <form onsubmit="return submitForm()" action="index.html">
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Your Name" pattern="[A-Za-z]{3,15}" title="Enter valid Name e.g. Ali " required>
                        </div>

                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Your Email" title="Enter valid Email e.g. ali@gmail.com " required>
                        </div>

                        <div class="mb-3">
                            <textarea class="form-control" rows="5" placeholder="Your Message"></textarea>
                        </div>
                        <!-- <button class="btn btn-warning" onclick="submitForm()">Send Message</button> -->

                         <input type="submit" class="send-btn" value="send message">                    
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Footer -->
    <div id="footer"></div>
</body>

</html>

<!-- js link file  -->
<script src="script.js"></script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
    integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
    crossorigin="anonymous"></script>

<script>

    function submitForm() {
        alert("Message sent successfully!");
        window.location.href='index.html';
    }

</script>
